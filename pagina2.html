<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>hola</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            background-color: #f4f4f4; /* Un gris clarito para que resalte */
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        img {
            width: 300px; /* Aquí controlas el tamaño pequeño */
            height: auto;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2); /* Un toque de sombra para que se vea pro */
        }
    </style>
</head>
<body>
    <h1>hola profe</h1>
    <img src="https://i.pinimg.com/1200x/de/3a/21/de3a2199180206c1f82e426d232fdf37.jpg" alt="Imagen pequeña">
</body>
</html>
